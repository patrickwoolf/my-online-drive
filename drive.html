<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudDrive Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #scroll-container { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafc; }
        #editor { min-height: 100%; padding: 2rem; outline: none; background: white; margin: 0; transition: transform 0.2s ease-in-out; transform-origin: top left; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; box-sizing: border-box; }
        #editor * { font-family: inherit !important; font-size: 1rem !important; color: #334155 !important; background-color: transparent !important; line-height: 1.5 !important; }
        #editor table { border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #cbd5e1 !important; }
        #editor td { border: 1px solid #cbd5e1 !important; padding: 8px; min-width: 40px; }
        .toolbar-scroll { display: flex; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        #sidebar { transition: all 0.3s ease; width: 280px; z-index: 50; flex-shrink: 0; }
        .sidebar-closed { margin-left: -280px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-saved { background: #22c55e; }
        .status-unsaved { background: #ef4444; }
        .status-syncing { background: #3b82f6; animation: pulse 1s infinite; }
        .file-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; position: relative; }
        .file-item:hover { background-color: #eff6ff; }
        .file-name { font-size: 0.875rem; color: #334155; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .delete-btn { color: #94a3b8; padding: 4px; border-radius: 4px; transition: all 0.2s; opacity: 0; }
        .file-item:hover .delete-btn { opacity: 1; color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-white border-b p-2 shadow-sm z-20">
        <div class="flex justify-between items-center px-2 gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-md"><i data-lucide="menu" size="20"></i></button>
                <h1 class="text-md font-bold text-blue-600 flex items-center gap-1">
                    <i data-lucide="cloud-cog" size="18"></i> CloudDrive
                </h1>
            </div>
            <div class="flex items-center gap-2 flex-1 justify-end max-w-2xl">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full max-w-[120px] border rounded-md px-3 py-1.5 text-xs outline-none bg-slate-50">
                <div id="saveStatus" class="flex text-[10px] uppercase font-bold text-slate-400 items-center shrink-0">
                    <span class="status-dot status-saved mr-1"></span> 
                    <span id="statusText">Ready</span>
                </div>
                <button onclick="syncFiles()" class="bg-blue-600 text-white p-1.5 rounded-md hover:bg-blue-700 transition-all"><i data-lucide="refresh-cw" size="16"></i></button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="bg-white border-r flex flex-col w-[280px]">
            <div class="p-3 border-b bg-slate-50 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Files</span>
                    <div class="flex gap-1">
                        <button onclick="createNewFile()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md" title="New File"><i data-lucide="file-plus" size="18"></i></button>
                    </div>
                </div>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full">
            <div class="p-1 border-b bg-slate-50/50 toolbar-scroll flex items-center gap-1">
                <button onclick="exec('bold')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="bold" size="16"></i></button>
                <button onclick="exec('italic')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="italic" size="16"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="insertTable()" class="p-2 min-w-[40px] text-slate-700 hover:bg-white rounded"><i data-lucide="table" size="18"></i></button>
                <div class="grid grid-cols-3 gap-px bg-slate-300 border border-slate-300 rounded overflow-hidden mx-1 shrink-0">
                    <button onclick="tableAction('addRowBelow')" class="bg-white p-1.5 hover:bg-blue-50"><i data-lucide="arrow-down-to-line" size="14" class="text-blue-600"></i></button>
                    <button onclick="tableAction('deleteRow')" class="bg-white p-1.5 hover:bg-red-50"><i data-lucide="list-x" size="14" class="text-red-500"></i></button>
                    <button onclick="tableAction('deleteColumn')" class="bg-white p-1.5 hover:bg-red-50"><i data-lucide="columns-2" size="14" class="text-red-500"></i></button>
                </div>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 min-w-[40px] text-blue-600 hover:bg-white rounded"><i data-lucide="image-plus" size="18"></i></button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                <div class="ml-auto pr-2 shrink-0">
                    <span id="currentFileName" class="text-xs font-medium text-slate-400 truncate max-w-[100px] block">No file</span>
                </div>
            </div>

            <div id="scroll-container">
                <div id="editor" contenteditable="true" class="prose max-w-none text-base"></div>
            </div>
        </main>
    </div>

    <script>
        const REPO = 'patrickwoolf/my-online-drive';
        let currentFilePath = '', currentFileSha = '', isDirty = false, isSaving = false;

        const getHeaders = () => ({ 
            'Authorization': `token ${document.getElementById('ghToken').value}`, 
            'Accept': 'application/vnd.github.v3+json' 
        });

        document.addEventListener('DOMContentLoaded', () => {
            const tk = localStorage.getItem('gh_token');
            if (tk) {
                document.getElementById('ghToken').value = tk;
                syncFiles();
            }
            lucide.createIcons();
        });

        // 修改後的同步邏輯
        async function syncFiles() {
            if (!document.getElementById('ghToken').value) return;
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            updateStatus('syncing', 'Syncing...');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/?t=${Date.now()}`, { headers: getHeaders() });
                const files = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';
                
                files.forEach(f => {
                    if (f.type === 'dir' || f.name === 'assets') return;
                    
                    const hasExt = f.name.includes('.');
                    const ext = hasExt ? f.name.split('.').pop().toLowerCase() : '';
                    const isEditable = !hasExt || ['html', 'txt', 'md'].includes(ext);
                    const isPdf = ext === 'pdf';
                    
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `
                        <div onclick="handleFileClick('${f.path}', '${f.download_url}', ${isEditable}, ${isPdf})" class="flex items-start gap-3 flex-1 min-w-0">
                            <i data-lucide="${isEditable ? 'file-text' : (isPdf ? 'file-text' : 'file')}" size="18" class="${isEditable ? 'text-blue-500' : (isPdf ? 'text-red-400' : 'text-slate-400')} shrink-0 mt-0.5"></i>
                            <span class="file-name">${f.name}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteItem('${f.path}', '${f.sha}')" class="delete-btn"><i data-lucide="trash-2" size="14"></i></button>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
                updateStatus('saved', 'Ready');
            } catch (err) { updateStatus('unsaved', 'Sync Error'); }
        }

        // 修改後的點擊處理邏輯 (含 PDF)
        async function handleFileClick(path, url, isEditable, isPdf) {
            if (isEditable) {
                updateStatus('syncing', 'Loading...');
                try {
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: getHeaders() });
                    const data = await res.json();
                    // 處理中文亂碼的解碼方式
                    document.getElementById('editor').innerHTML = decodeURIComponent(escape(atob(data.content)));
                    currentFilePath = path; 
                    currentFileSha = data.sha;
                    document.getElementById('currentFileName').innerText = path;
                    isDirty = false; 
                    updateStatus('saved', 'Opened');
                } catch (e) { updateStatus('unsaved', 'Load Error'); }
            } else if (isPdf) {
                updateStatus('syncing', 'Opening PDF...');
                const res = await fetch(url);
                const blob = await res.blob();
                window.open(URL.createObjectURL(new Blob([blob], {type: 'application/pdf'})), '_blank');
                updateStatus('saved', 'PDF Opened');
            } else { 
                window.open(url, '_blank'); 
            }
        }

        async function saveFile() {
            if (!currentFilePath || isSaving) return;
            isSaving = true; updateStatus('syncing', 'Saving...');
            // 處理中文內容的編碼方式
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor').innerHTML)));
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFilePath}`, {
                    method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'auto save', content, sha: currentFileSha })
                });
                if (res.ok) {
                    const d = await res.json();
                    currentFileSha = d.content.sha;
                    isDirty = false;
                    updateStatus('saved', 'Saved');
                }
            } catch (e) { updateStatus('unsaved', 'Save Error'); }
            isSaving = false;
        }

        async function createNewFile() {
            const name = prompt("請輸入新檔名 (例如: note.html):"); if (!name) return;
            currentFilePath = name;
            currentFileSha = ''; 
            document.getElementById('editor').innerHTML = '<div></div>';
            await saveFile(); 
            syncFiles();
        }

        async function deleteItem(path, sha) {
            if (confirm(`確定要刪除 "${path}" 嗎？`)) {
                updateStatus('syncing', 'Deleting...');
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { 
                    method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ message: 'delete', sha: sha }) 
                });
                if (res.ok) syncFiles();
            }
        }

        // 圖片上傳邏輯 (存入 assets 資料夾)
        async function uploadImageAndInsert(file) {
            if (!file || !document.getElementById('ghToken').value) return;
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const fileName = `assets/${Date.now()}-${file.name || 'img.png'}`;
                updateStatus('syncing', 'Uploading Image...');
                try {
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${fileName}`, {
                        method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'upload image', content: base64 })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const imgHtml = `<img src="${data.content.download_url}" style="max-width:100%;">`;
                        document.execCommand('insertHTML', false, imgHtml);
                        updateStatus('saved', 'Image Inserted');
                    }
                } catch (e) { updateStatus('unsaved', 'Upload Error'); }
            };
            reader.readAsDataURL(file);
        }

        function handleImageSelect(e) { uploadImageAndInsert(e.target.files[0]); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function updateStatus(s, t) { 
            const dot = document.querySelector('.status-dot');
            if(dot) dot.className = `status-dot status-${s} mr-1`;
            document.getElementById('statusText').innerText = t; 
        }
        function exec(c) { document.execCommand(c, false, null); }
        function insertTable() { document.execCommand('insertHTML', false, '<table><tr><td></td><td></td></tr><tr><td></td><td></td></tr></table><p><br></p>'); }
        function tableAction(cmd) {
            const sel = window.getSelection(); const td = sel.anchorNode?.parentElement?.closest('td');
            if (!td) return;
            const tr = td.parentElement, table = tr.closest('table');
            if (cmd === 'addRowBelow') table.insertRow(tr.rowIndex + 1);
            else if (cmd === 'deleteRow') table.deleteRow(tr.rowIndex);
            else if (cmd === 'deleteColumn') {
                const idx = td.cellIndex;
                Array.from(table.rows).forEach(r => r.deleteCell(idx));
            }
            isDirty = true; updateStatus('unsaved', 'Modified');
        }

        document.getElementById('editor').addEventListener('input', () => { 
            isDirty = true; 
            updateStatus('unsaved', 'Unsaved'); 
        });

        // 每 15 秒自動儲存
        setInterval(() => { if (isDirty) saveFile(); }, 15000);
    </script>
</body>
</html>
