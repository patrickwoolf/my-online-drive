<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudDrive Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #scroll-container { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafc; }
        #editor { min-height: 100%; padding: 2rem; outline: none; background: white; margin: 0; transition: transform 0.2s ease-in-out; transform-origin: top left; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; box-sizing: border-box; }
        #editor * { font-family: inherit !important; font-size: 1rem !important; color: #334155 !important; background-color: transparent !important; line-height: 1.5 !important; }
        #editor table, #editor td { all: revert; }
        #editor img { max-width: 100% !important; height: auto !important; display: block; margin: 1rem 0; pointer-events: auto; }
        .toolbar-scroll { display: flex; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        #sidebar { transition: all 0.3s ease; width: 280px; z-index: 50; flex-shrink: 0; }
        .sidebar-closed { margin-left: -280px; }
        #overlay { display: none; }
        @media (max-width: 768px) { #sidebar { position: fixed; height: 100svh; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-saved { background: #22c55e; }
        .status-unsaved { background: #ef4444; }
        .status-syncing { background: #3b82f6; animation: pulse 1s infinite; }
        .file-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 0.75rem; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; position: relative; min-width: 0; }
        .file-item:hover { background-color: #eff6ff; }
        .file-name { word-break: break-all; white-space: normal; font-size: 0.875rem; color: #334155; font-weight: 500; flex: 1; line-height: 1.25rem; }
        .delete-btn { opacity: 0; transition: opacity 0.2s, color 0.2s; color: #94a3b8; padding: 4px; border-radius: 4px; flex-shrink: 0; }
        .file-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ef4444; background: #fee2e2; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #cbd5e1; }
        td { border: 1px solid #cbd5e1; padding: 8px; min-width: 40px; }
        img.uploading { opacity: 0.4; filter: blur(2px); cursor: wait; border: 2px dashed #3b82f6; }
        /* Drag and Drop Highlight */
        .drag-over { background-color: #dbeafe !important; border: 2px dashed #3b82f6 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden sidebar-active" ondragover="event.preventDefault()" ondrop="handleGlobalDrop(event)">
    <div id="overlay" onclick="toggleSidebar()"></div>

    <header class="bg-white border-b p-2 shadow-sm z-20">
        <div class="flex justify-between items-center px-2 gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-md"><i data-lucide="menu" size="20"></i></button>
                <h1 class="text-md font-bold text-blue-600 flex items-center gap-1">
                    <i data-lucide="cloud-cog" size="18"></i> <span class="hidden sm:inline">CloudDrive</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 flex-1 justify-end max-w-2xl">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full max-w-[120px] sm:max-w-[240px] border rounded-md px-3 py-1.5 text-xs focus:ring-2 focus:ring-blue-400 outline-none bg-slate-50 transition-all">
                <div id="saveStatus" class="flex text-[10px] uppercase font-bold text-slate-400 items-center shrink-0">
                    <span class="status-dot status-saved mr-1"></span> 
                    <span id="statusText" class="hidden md:inline">Ready</span>
                </div>
                <button onclick="syncFiles()" class="bg-blue-600 text-white p-1.5 rounded-md shrink-0 hover:bg-blue-700 active:scale-95 transition-all"><i data-lucide="refresh-cw" size="16"></i></button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="bg-white border-r flex flex-col shadow-xl md:shadow-none absolute md:relative h-full">
            <div class="p-3 border-b bg-slate-50 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Explorer</span>
                    <div class="flex gap-1">
                        <button onclick="createNewFolder()" class="p-1.5 text-slate-600 hover:bg-blue-100 rounded-md" title="新建資料夾"><i data-lucide="folder-plus" size="16"></i></button>
                        <button onclick="createNewFile()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md" title="新建文件"><i data-lucide="file-plus" size="16"></i></button>
                    </div>
                </div>
                <div id="breadcrumb" class="flex items-center gap-1 text-[11px] text-blue-600 font-medium overflow-x-auto whitespace-nowrap">
                    <span class="cursor-pointer hover:underline" onclick="navigateTo('')">Root</span>
                </div>
            </div>
            
            <div id="fileList" class="flex-1 overflow-y-auto p-2 pb-20 space-y-0.5" ondragover="this.classList.add('drag-over'); event.preventDefault();" ondragleave="this.classList.remove('drag-over')" ondrop="handleSidebarDrop(event)">
                <div class="text-center py-4 text-slate-400 text-xs">Loading...</div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full">
            <div class="p-1 border-b bg-slate-50/50 toolbar-scroll items-center gap-1">
                <button onclick="exec('bold')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="bold" size="16"></i></button>
                <button onclick="exec('italic')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="italic" size="16"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="insertTable()" class="p-2 min-w-[40px] text-slate-700 hover:bg-white rounded"><i data-lucide="table" size="18"></i></button>
                <div class="grid grid-cols-3 gap-px bg-slate-300 border border-slate-300 rounded overflow-hidden mx-1 shrink-0">
                    <button onclick="tableAction('addRowAbove')" class="bg-white p-1.5 hover:bg-blue-50"><i data-lucide="arrow-up-to-line" size="14"></i></button>
                    <button onclick="tableAction('addColLeft')" class="bg-white p-1.5 hover:bg-blue-50"><i data-lucide="arrow-left-to-line" size="14"></i></button>
                    <button onclick="tableAction('addColRight')" class="bg-white p-1.5 hover:bg-blue-50"><i data-lucide="arrow-right-to-line" size="14"></i></button>
                    <button onclick="tableAction('addRowBelow')" class="bg-white p-1.5 hover:bg-blue-50"><i data-lucide="arrow-down-to-line" size="14"></i></button>
                    <button onclick="tableAction('deleteRow')" class="bg-white p-1.5 hover:bg-red-50"><i data-lucide="list-x" size="14"></i></button>
                    <button onclick="tableAction('deleteColumn')" class="bg-white p-1.5 hover:bg-red-50"><i data-lucide="columns-2" size="14"></i></button>
                </div>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 min-w-[40px] text-blue-600 hover:bg-white rounded"><i data-lucide="image-plus" size="18"></i></button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <div class="flex items-center bg-slate-200/50 rounded-lg px-1">
                    <button onclick="changeZoom(-0.1)" class="p-2 hover:bg-slate-200 rounded-md"><i data-lucide="zoom-out" size="16"></i></button>
                    <button onclick="resetZoom()" id="zoomPercent" class="text-[10px] font-bold w-10 text-center">100%</button>
                    <button onclick="changeZoom(0.1)" class="p-2 hover:bg-slate-200 rounded-md"><i data-lucide="zoom-in" size="16"></i></button>
                </div>
                <div class="ml-auto pr-2 shrink-0">
                    <span id="currentFileName" class="text-xs font-medium text-slate-400 truncate max-w-[100px] block">No file</span>
                </div>
            </div>

            <div id="scroll-container">
                <div id="editor" contenteditable="true" class="prose max-w-none text-base"></div>
            </div>
        </main>
    </div>

    <script>
        const REPO = 'patrickwoolf/my-online-drive';
        let currentPath = ''; // 當前所在的目錄
        let currentFilePath = '', currentFileSha = '', isDirty = false, isSaving = false, zoomLevel = 1.0;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const tk = localStorage.getItem('gh_token');
            if (tk) { document.getElementById('ghToken').value = tk; syncFiles(); }
        });

        const getHeaders = () => ({ 'Authorization': `token ${document.getElementById('ghToken').value}`, 'Accept': 'application/vnd.github.v3+json' });

        // 導覽功能
        function navigateTo(path) {
            currentPath = path;
            updateBreadcrumbs();
            syncFiles();
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumb');
            container.innerHTML = `<span class="cursor-pointer hover:underline" onclick="navigateTo('')">Root</span>`;
            if (!currentPath) return;
            
            let full = '';
            currentPath.split('/').forEach(part => {
                full += (full ? '/' : '') + part;
                const thisPath = full;
                container.innerHTML += ` <i data-lucide="chevron-right" size="10" class="text-slate-300"></i> <span class="cursor-pointer hover:underline" onclick="navigateTo('${thisPath}')">${part}</span>`;
            });
            lucide.createIcons();
        }

        async function syncFiles() {
            const token = document.getElementById('ghToken').value;
            if (!token) return;
            localStorage.setItem('gh_token', token);
            updateStatus('syncing', 'Syncing...');
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentPath}?t=${Date.now()}`, { headers: getHeaders() });
                const files = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';

                if (!Array.isArray(files)) throw new Error();

                files.forEach(f => {
                    if (f.name === 'assets' && !currentPath) return; // 隱藏根目錄 assets
                    
                    const isDir = f.type === 'dir';
                    const hasExt = f.name.includes('.');
                    const ext = hasExt ? f.name.split('.').pop().toLowerCase() : '';
                    const isEditable = !isDir && (!hasExt || ['html', 'txt', 'md'].includes(ext));
                    const isPdf = ext === 'pdf';

                    const div = document.createElement('div');
                    div.className = 'file-item';
                    
                    let icon = 'file';
                    if (isDir) icon = 'folder';
                    else if (isEditable) icon = 'file-text';
                    else if (isPdf) icon = 'file-digit';

                    div.innerHTML = `
                        <div class="flex items-start gap-3 flex-1 min-w-0" onclick="${isDir ? `MapsTo('${f.path}')` : `handleFileClick('${f.path}', '${f.download_url}', ${isEditable}, ${isPdf})`}">
                            <i data-lucide="${icon}" size="18" class="${isDir ? 'text-amber-400' : (isEditable ? 'text-blue-500' : 'text-slate-400')} shrink-0 mt-0.5"></i>
                            <span class="file-name">${f.name}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteItem('${f.path}', '${f.sha}', ${isDir})" class="delete-btn"><i data-lucide="trash-2" size="14"></i></button>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
                updateStatus('saved', 'Ready');
            } catch (err) { updateStatus('unsaved', 'Sync Error'); }
        }

        async function handleFileClick(path, url, isEditable, isPdf) {
            if (isEditable) {
                updateStatus('syncing', 'Loading...');
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: getHeaders() });
                const data = await res.json();
                document.getElementById('editor').innerHTML = decodeURIComponent(escape(atob(data.content)));
                currentFilePath = path; currentFileSha = data.sha;
                document.getElementById('currentFileName').innerText = path.split('/').pop();
                isDirty = false; updateStatus('saved', 'Opened');
                if (window.innerWidth < 768) toggleSidebar();
            } else if (isPdf) {
                window.open(url, '_blank');
            } else { window.open(url, '_blank'); }
        }

        // 修改後的刪除：支援資料夾（GitHub API 刪除資料夾需刪除其內所有檔案，這裡簡化處理檔案）
        async function deleteItem(path, sha, isDir) {
            if (isDir) {
                alert("GitHub API 不支援直接刪除非空資料夾。請先手動刪除資料夾內的檔案。");
                return;
            }
            if (!confirm(`確定刪除 ${path}？`)) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { 
                method: 'DELETE', 
                headers: getHeaders(), 
                body: JSON.stringify({ message: 'delete', sha: sha }) 
            });
            if (res.ok) { 
                if (currentFilePath === path) { document.getElementById('editor').innerHTML = ''; currentFilePath = ''; } 
                syncFiles(); 
            }
        }

        async function createNewFile() {
            const name = prompt("輸入檔案名稱 (例如: note.html):"); 
            if (!name) return;
            const fullPath = currentPath ? `${currentPath}/${name}` : name;
            currentFilePath = fullPath; 
            document.getElementById('editor').innerHTML = '<div>New Page</div>';
            await saveFile(); 
            syncFiles();
        }

        async function createNewFolder() {
            const name = prompt("輸入資料夾名稱:");
            if (!name) return;
            // GitHub 不存在空資料夾，我們建立一個 .keep 檔來模擬
            const fullPath = currentPath ? `${currentPath}/${name}/.keep` : `${name}/.keep`;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${fullPath}`, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify({ message: 'create folder', content: btoa(' ') })
            });
            if (res.ok) syncFiles();
        }

        // 拖放上傳處理
        async function handleSidebarDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            for (let file of files) {
                await uploadFileDirect(file, currentPath);
            }
        }

        function handleGlobalDrop(e) {
            // 避免在編輯器內拖放文字時觸發上傳
            if (e.target.closest('#editor')) return;
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFileDirect(files[0], currentPath);
        }

        async function uploadFileDirect(file, targetDir) {
            updateStatus('syncing', 'Uploading...');
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const fullPath = targetDir ? `${targetDir}/${file.name}` : file.name;
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${fullPath}`, {
                    method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: `Upload: ${file.name}`, content: base64 })
                });
                if (res.ok) { updateStatus('saved', 'Uploaded'); syncFiles(); }
                else { updateStatus('unsaved', 'Upload Failed'); }
            };
        }

        // 原有功能保持不變...
        async function saveFile() {
            if (!currentFilePath || isSaving) return;
            isSaving = true; updateStatus('syncing', 'Saving...');
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor').innerHTML)));
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFilePath}`, {
                method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'save', content, sha: currentFileSha })
            });
            if (res.ok) { const d = await res.json(); currentFileSha = d.content.sha; isDirty = false; updateStatus('saved', 'Saved'); }
            isSaving = false;
        }

        async function processImageUpload(file) {
            if (!currentFilePath) { alert("請先開啟一個檔案！"); return; }
            const tempId = 'img-' + Date.now();
            document.execCommand('insertHTML', false, `<img src="${URL.createObjectURL(file)}" id="${tempId}" class="uploading">`);
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                // 圖片統一放在根目錄的 assets/檔案名/ 之下
                const fileName = currentFilePath.split('/').pop().split('.')[0];
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/assets/${fileName}/${Date.now()}.jpg`, {
                    method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'img', content: base64 })
                });
                if (res.ok) {
                    const d = await res.json();
                    const img = document.getElementById(tempId);
                    img.src = d.content.download_url; img.classList.remove('uploading');
                    saveFile();
                }
            };
        }

        function insertTable() { document.execCommand('insertHTML', false, '<table><tr><td></td><td></td></tr><tr><td></td><td></td></tr></table><p><br></p>'); }
        function tableAction(cmd) {
            const sel = window.getSelection();
            const td = sel.anchorNode?.parentElement?.closest('td');
            if (!td) return;
            const tr = td.parentElement, table = tr.closest('table');
            const colIdx = td.cellIndex, rowIdx = tr.rowIndex;
            if (cmd === 'addRowAbove') { const r = table.insertRow(rowIdx); for(let i=0; i<tr.cells.length; i++) r.insertCell(); }
            else if (cmd === 'addRowBelow') { const r = table.insertRow(rowIdx + 1); for(let i=0; i<tr.cells.length; i++) r.insertCell(); }
            else if (cmd === 'addColLeft') { Array.from(table.rows).forEach(r => r.insertCell(colIdx)); }
            else if (cmd === 'addColRight') { Array.from(table.rows).forEach(r => r.insertCell(colIdx + 1)); }
            else if (cmd === 'deleteRow') { table.rows.length > 1 ? table.deleteRow(rowIdx) : table.remove(); }
            else if (cmd === 'deleteColumn') { if (tr.cells.length > 1) Array.from(table.rows).forEach(r => r.deleteCell(colIdx)); else table.remove(); }
            isDirty = true;
        }
        function changeZoom(delta) { zoomLevel = Math.min(Math.max(0.5, zoomLevel + delta), 2.0); applyZoom(); }
        function resetZoom() { zoomLevel = 1.0; applyZoom(); }
        function applyZoom() { document.getElementById('editor').style.transform = `scale(${zoomLevel})`; document.getElementById('zoomPercent').innerText = `${Math.round(zoomLevel * 100)}%`; }
        async function handleImageSelect(e) { const file = e.target.files[0]; if (file) processImageUpload(file); e.target.value = ''; }
        function updateStatus(s, t) { document.querySelector('.status-dot').className = `status-dot status-${s} mr-1`; document.getElementById('statusText').innerText = t; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); document.body.classList.toggle('sidebar-active'); }
        function exec(c) { document.execCommand(c, false, null); }
        const editor = document.getElementById('editor');
        editor.addEventListener('input', () => { isDirty = true; updateStatus('unsaved', 'Unsaved'); });
        editor.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) { if (item.kind === 'file' && item.type.startsWith('image/')) { e.preventDefault(); processImageUpload(item.getAsFile()); } }
        });
        setInterval(() => { if (isDirty) saveFile(); }, 10000);
    </script>
</body>
</html>
