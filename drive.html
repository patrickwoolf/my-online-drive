<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudDrive Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #scroll-container { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafc; }
        #editor { min-height: 100%; padding: 2rem; outline: none; background: white; margin: 0; transition: transform 0.2s ease-in-out; transform-origin: top left; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; box-sizing: border-box; }
        #editor * { font-family: inherit !important; font-size: 1rem !important; color: #334155 !important; background-color: transparent !important; line-height: 1.5 !important; }
        #editor img { max-width: 100% !important; height: auto !important; display: block; margin: 1rem 0; pointer-events: auto; }
        #editor table { border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #cbd5e1 !important; }
        #editor td { border: 1px solid #cbd5e1 !important; padding: 8px; min-width: 40px; }
        .toolbar-scroll { display: flex; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        #sidebar { transition: all 0.3s ease; width: 280px; z-index: 50; flex-shrink: 0; }
        .sidebar-closed { margin-left: -280px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-saved { background: #22c55e; }
        .status-unsaved { background: #ef4444; }
        .status-syncing { background: #3b82f6; animation: pulse 1s infinite; }
        .file-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; position: relative; }
        .file-item:hover { background-color: #eff6ff; }
        .file-name { font-size: 0.875rem; color: #334155; font-weight: 500; flex: 1; word-break: break-all; }
        .img-uploading { opacity: 0.4; filter: blur(2px); border: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-white border-b p-2 shadow-sm z-20">
        <div class="flex justify-between items-center px-2 gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-md"><i data-lucide="menu" size="20"></i></button>
                <h1 class="text-md font-bold text-blue-600 flex items-center gap-1"><i data-lucide="cloud-cog" size="18"></i> CloudDrive</h1>
            </div>
            <div class="flex items-center gap-2 flex-1 justify-end max-w-2xl">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full max-w-[120px] border rounded-md px-3 py-1.5 text-xs outline-none bg-slate-50">
                <div id="saveStatus" class="flex text-[10px] uppercase font-bold text-slate-400 items-center shrink-0">
                    <span class="status-dot status-saved mr-1"></span> <span id="statusText">Ready</span>
                </div>
                <button onclick="syncFiles()" class="bg-blue-600 text-white p-1.5 rounded-md hover:bg-blue-700 transition-all"><i data-lucide="refresh-cw" size="16"></i></button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="bg-white border-r flex flex-col w-[280px]">
            <div class="p-3 border-b bg-slate-50 flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase text-slate-400">Files</span>
                <div class="flex gap-1">
                    <button onclick="createNewFile()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md"><i data-lucide="file-plus" size="18"></i></button>
                </div>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 pb-20 space-y-1"></div>
        </aside>
        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full">
            <div class="p-1 border-b bg-slate-50/50 toolbar-scroll flex items-center gap-1">
                <button onclick="exec('bold')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="bold" size="16"></i></button>
                <button onclick="exec('italic')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="italic" size="16"></i></button>
                <button onclick="insertTable()" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="table" size="18"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 min-w-[40px] text-blue-600 hover:bg-white rounded"><i data-lucide="image-plus" size="18"></i></button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                <div class="ml-auto pr-2 shrink-0"><span id="currentFileName" class="text-xs font-medium text-slate-400 truncate max-w-[100px] block">No file</span></div>
            </div>
            <div id="scroll-container"><div id="editor" contenteditable="true" class="prose max-w-none text-base"></div></div>
        </main>
    </div>

    <script>
        const REPO = 'patrickwoolf/my-online-drive';
        let currentFilePath = '', currentFileSha = '', isDirty = false;
        const getHeaders = () => ({ 'Authorization': `token ${document.getElementById('ghToken').value}`, 'Accept': 'application/vnd.github.v3+json' });

        document.addEventListener('DOMContentLoaded', () => {
            const tk = localStorage.getItem('gh_token');
            if (tk) document.getElementById('ghToken').value = tk;
            syncFiles();
            lucide.createIcons();
        });

        async function syncFiles() {
            if (!document.getElementById('ghToken').value) return;
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/?t=${Date.now()}`, { headers: getHeaders() });
                const files = await res.json();
                const list = document.getElementById('fileList'); list.innerHTML = '';
                files.forEach(f => {
                    if (f.name === 'assets') return;
                    const ext = f.name.split('.').pop().toLowerCase();
                    const isEditable = ['html', 'txt', 'md', ''].includes(ext);
                    const isPdf = ext === 'pdf';
                    const isImage = ['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext);
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `<div class="flex-1 flex items-center gap-2" onclick="handleFileClick('${f.path}', '${f.download_url}', ${isEditable}, ${isPdf}, ${isImage})">
                                        <i data-lucide="${isEditable ? 'file-text' : (isPdf ? 'file-digit' : 'image')}" size="16"></i>
                                        <span class="file-name">${f.name}</span>
                                     </div>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { updateStatus('unsaved', 'Sync Error'); }
        }

        async function handleFileClick(path, url, isEditable, isPdf, isImage) {
            if (isEditable) {
                updateStatus('syncing', 'Loading...');
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: getHeaders() });
                const data = await res.json();
                document.getElementById('editor').innerHTML = decodeURIComponent(escape(atob(data.content)));
                currentFilePath = path; currentFileSha = data.sha;
                document.getElementById('currentFileName').innerText = path;
                updateStatus('saved', 'Opened');
            } else if (isPdf) {
                const res = await fetch(url);
                const blob = await res.blob();
                window.open(URL.createObjectURL(new Blob([blob], {type: 'application/pdf'})), '_blank');
            } else if (isImage) {
                window.open(url, '_blank');
            }
        }

        async function processImageUpload(file) {
            if (!currentFilePath) { alert("請先開啟一個檔案！"); return; }
            const tempId = 'img-' + Date.now();
            document.execCommand('insertHTML', false, `<img src="${URL.createObjectURL(file)}" id="${tempId}" class="img-uploading">`);
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/assets/${Date.now()}.jpg`, {
                    method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'upload image', content: base64 })
                });
                if (res.ok) {
                    const d = await res.json();
                    const img = document.getElementById(tempId);
                    img.src = d.content.download_url; 
                    img.classList.remove('img-uploading');
                    saveFile();
                }
            };
        }

        async function handleImageSelect(e) { if(e.target.files[0]) processImageUpload(e.target.files[0]); }

        async function saveFile() {
            if (!currentFilePath || isSaving) return;
            isSaving = true; updateStatus('syncing', 'Saving...');
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor').innerHTML)));
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFilePath}`, {
                method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'save', content, sha: currentFileSha })
            });
            if (res.ok) { const d = await res.json(); currentFileSha = d.content.sha; isDirty = false; updateStatus('saved', 'Saved'); }
            isSaving = false;
        }

        async function createNewFile() {
            const name = prompt("Filename:"); if (!name) return;
            currentFilePath = name; currentFileSha = '';
            document.getElementById('editor').innerHTML = '<div></div>';
            await saveFile(); syncFiles();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function updateStatus(s, t) { document.querySelector('.status-dot').className = `status-dot status-${s} mr-1`; document.getElementById('statusText').innerText = t; }
        function exec(c) { document.execCommand(c, false, null); }
        function insertTable() { document.execCommand('insertHTML', false, '<table><tr><td></td><td></td></tr><tr><td></td><td></td></tr></table><p><br></p>'); }
        
        document.getElementById('editor').addEventListener('input', () => { isDirty = true; updateStatus('unsaved', 'Unsaved'); });
        document.getElementById('editor').addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    e.preventDefault(); 
                    processImageUpload(item.getAsFile());
                }
            }
        });
        setInterval(() => { if (isDirty) saveFile(); }, 15000);
    </script>
</body>
</html>
