<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudDrive Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #scroll-container { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafc; }
        #editor { min-height: 100%; padding: 2rem; outline: none; background: white; margin: 0; transition: transform 0.2s ease-in-out; transform-origin: top left; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; box-sizing: border-box; }
        #editor * { font-family: inherit !important; font-size: 1rem !important; color: #334155 !important; background-color: transparent !important; line-height: 1.5 !important; }
        .toolbar-scroll { display: flex; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        #sidebar { transition: all 0.3s ease; width: 280px; z-index: 50; flex-shrink: 0; }
        .sidebar-closed { margin-left: -280px; }
        #overlay { display: none; }
        @media (max-width: 768px) { #sidebar { position: fixed; height: 100svh; } }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-saved { background: #22c55e; }
        .status-unsaved { background: #ef4444; }
        .status-syncing { background: #3b82f6; animation: pulse 1s infinite; }
        
        /* 檔案項目樣式 */
        .file-item { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            padding: 0.6rem 0.75rem; 
            border-radius: 0.5rem; 
            cursor: pointer; 
            transition: background 0.2s; 
            position: relative; 
            overflow: hidden; /* 確保檔名不超出外框 */
        }
        .file-item:hover { background-color: #eff6ff; }
        
        /* 核心修改：完整顯示文字，不使用點點縮寫 */
        .file-name { 
            font-size: 0.875rem; 
            color: #334155; 
            font-weight: 500; 
            flex: 1; 
            white-space: nowrap; /* 強制一行 */
            overflow: hidden;    /* 隱藏超出部分 */
            text-overflow: clip; /* 不使用點點 ... */
        }
        
        /* 按鈕組：Hover 時直接蓋在文字上方 */
        .action-btns { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 0;
            bottom: 0;
            background: #eff6ff; /* 與 hover 背景色一致 */
            padding: 0 0.5rem;
            align-items: center;
            gap: 4px;
            box-shadow: -15px 0 15px #eff6ff; /* 增加左側陰影讓文字銜接自然點 */
        }
        .file-item:hover .action-btns { display: flex; }
        
        .icon-btn { color: #94a3b8; padding: 4px; border-radius: 4px; transition: all 0.2s; }
        .move-btn:hover { color: #3b82f6; background: #dbeafe; }
        .delete-btn:hover { color: #ef4444; background: #fee2e2; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-white border-b p-2 shadow-sm z-20">
        <div class="flex justify-between items-center px-2 gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-md"><i data-lucide="menu" size="20"></i></button>
                <h1 class="text-md font-bold text-blue-600 flex items-center gap-1">
                    <i data-lucide="cloud-cog" size="18"></i> <span class="hidden sm:inline">CloudDrive</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 flex-1 justify-end max-w-2xl">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full max-w-[120px] sm:max-w-[240px] border rounded-md px-3 py-1.5 text-xs outline-none bg-slate-50 transition-all">
                <div id="saveStatus" class="flex text-[10px] uppercase font-bold text-slate-400 items-center shrink-0">
                    <span class="status-dot status-saved mr-1"></span> 
                    <span id="statusText" class="hidden md:inline">Ready</span>
                </div>
                <button onclick="syncFiles()" class="bg-blue-600 text-white p-1.5 rounded-md shrink-0 hover:bg-blue-700 active:scale-95 transition-all"><i data-lucide="refresh-cw" size="16"></i></button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="bg-white border-r flex flex-col shadow-xl md:shadow-none absolute md:relative h-full">
            <div class="p-3 border-b bg-slate-50 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-slate-400">Files</span>
                    <div class="flex gap-1">
                        <button onclick="document.getElementById('anyFileInput').click()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md"><i data-lucide="upload" size="18"></i></button>
                        <button onclick="createNewFolder()" class="p-1.5 text-slate-600 hover:bg-blue-100 rounded-md"><i data-lucide="folder-plus" size="18"></i></button>
                        <button onclick="createNewFile()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md"><i data-lucide="file-plus" size="18"></i></button>
                    </div>
                </div>
                <input type="file" id="anyFileInput" class="hidden" onchange="uploadAnyFile(event)">
                <div id="breadcrumb" class="flex items-center gap-1 text-[11px] text-blue-600 font-medium overflow-x-auto whitespace-nowrap bg-white p-1 rounded border border-slate-200">
                    <span class="cursor-pointer hover:underline" onclick="navigateTo('')">Root</span>
                </div>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 pb-20 space-y-0.5">
                </div>
        </aside>

        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full">
            <div class="p-1 border-b bg-slate-50/50 toolbar-scroll items-center gap-1">
                <button onclick="exec('bold')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="bold" size="16"></i></button>
                <button onclick="exec('italic')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="italic" size="16"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="insertTable()" class="p-2 min-w-[40px] text-slate-700 hover:bg-white rounded"><i data-lucide="table" size="18"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 min-w-[40px] text-blue-600 hover:bg-white rounded"><i data-lucide="image-plus" size="18"></i></button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                <div class="ml-auto pr-2">
                    <span id="currentFileName" class="text-xs font-medium text-slate-400 truncate max-w-[100px] block">No file</span>
                </div>
            </div>
            <div id="scroll-container">
                <div id="editor" contenteditable="true" class="prose max-w-none text-base"></div>
            </div>
        </main>
    </div>

    <script>
        const REPO = 'patrickwoolf/my-online-drive';
        let currentPath = ''; 
        let currentFilePath = '', currentFileSha = '', isDirty = false, isSaving = false;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const tk = localStorage.getItem('gh_token');
            if (tk) { document.getElementById('ghToken').value = tk; syncFiles(); }
        });

        const getHeaders = () => ({ 'Authorization': `token ${document.getElementById('ghToken').value}`, 'Accept': 'application/vnd.github.v3+json' });

        function navigateTo(path) { currentPath = path; updateBreadcrumbs(); syncFiles(); }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumb');
            container.innerHTML = `<span class="cursor-pointer hover:underline" onclick="navigateTo('')">Root</span>`;
            if (!currentPath) return;
            let full = '';
            currentPath.split('/').filter(p => p).forEach(part => {
                full += (full ? '/' : '') + part;
                container.innerHTML += ` <i data-lucide="chevron-right" size="10" class="text-slate-300 mx-0.5"></i> <span class="cursor-pointer hover:underline" onclick="navigateTo('${full}')">${part}</span>`;
            });
            lucide.createIcons();
        }

        async function syncFiles() {
            if (!document.getElementById('ghToken').value) return;
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            updateStatus('syncing', 'Syncing...');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentPath}?t=${Date.now()}`, { headers: getHeaders() });
                const files = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';
                if (!Array.isArray(files)) return;

                files.sort((a, b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));

                files.forEach(f => {
                    if (f.name === 'assets' && !currentPath) return;
                    const isDir = f.type === 'dir';
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.onclick = (e) => {
                        if (e.target.closest('.action-btns')) return;
                        isDir ? navigateTo(f.path) : handleFileClick(f.path, f.download_url);
                    };

                    div.innerHTML = `
                        <i data-lucide="${isDir?'folder':'file-text'}" size="18" class="${isDir?'text-amber-400':'text-blue-500'} shrink-0"></i>
                        <span class="file-name">${f.name}</span>
                        <div class="action-btns">
                            <button onclick="event.stopPropagation(); moveItem('${f.path}', '${f.sha}')" class="icon-btn move-btn" title="移動"><i data-lucide="external-link" size="14"></i></button>
                            <button onclick="event.stopPropagation(); deleteItem('${f.path}', '${f.sha}', ${isDir})" class="icon-btn delete-btn" title="刪除"><i data-lucide="trash-2" size="14"></i></button>
                        </div>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
                updateStatus('saved', 'Ready');
            } catch (err) { updateStatus('unsaved', 'Sync Error'); }
        }

        async function moveItem(oldPath, sha) {
            const newPath = prompt("移動檔案至 (路徑/檔名)：", oldPath);
            if (!newPath || newPath === oldPath) return;
            updateStatus('syncing', 'Moving...');
            try {
                const resContent = await fetch(`https://api.github.com/repos/${REPO}/contents/${oldPath}`, { headers: getHeaders() });
                const data = await resContent.json();
                const resCreate = await fetch(`https://api.github.com/repos/${REPO}/contents/${newPath}`, {
                    method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: `Move to ${newPath}`, content: data.content })
                });
                if (resCreate.ok) {
                    await fetch(`https://api.github.com/repos/${REPO}/contents/${oldPath}`, {
                        method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ message: `Cleanup`, sha: sha })
                    });
                    syncFiles();
                }
            } catch (e) { alert("移動失敗"); }
        }

        async function handleFileClick(path, url) {
            updateStatus('syncing', 'Loading...');
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: getHeaders() });
            const data = await res.json();
            try {
                document.getElementById('editor').innerHTML = decodeURIComponent(escape(atob(data.content)));
                currentFilePath = path; currentFileSha = data.sha;
                document.getElementById('currentFileName').innerText = path.split('/').pop();
                updateStatus('saved', 'Opened');
            } catch(e) { window.open(url, '_blank'); }
        }

        async function deleteItem(path, sha, isDir) {
            if (!confirm(`確定刪除？`)) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ message: 'delete', sha: sha }) });
            if (res.ok) syncFiles();
        }

        async function saveFile() {
            if (!currentFilePath || isSaving) return;
            isSaving = true; updateStatus('syncing', 'Saving...');
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor').innerHTML)));
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFilePath}`, {
                method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'save', content, sha: currentFileSha })
            });
            if (res.ok) { const d = await res.json(); currentFileSha = d.content.sha; isDirty = false; updateStatus('saved', 'Saved'); }
            isSaving = false;
        }

        async function createNewFile() {
            const name = prompt("Filename:"); if (!name) return;
            currentFilePath = currentPath ? `${currentPath}/${name}` : name;
            currentFileSha = ''; document.getElementById('editor').innerHTML = '<div>New</div>';
            await saveFile(); syncFiles();
        }

        async function createNewFolder() {
            const name = prompt("Folder Name:"); if (!name) return;
            const path = currentPath ? `${currentPath}/${name}/.keep` : `${name}/.keep`;
            await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'folder', content: btoa(' ') }) });
            syncFiles();
        }

        async function uploadAnyFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const path = currentPath ? `${currentPath}/${file.name}` : file.name;
                await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'upload', content: base64 }) });
                syncFiles();
            };
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function updateStatus(s, t) { document.querySelector('.status-dot').className = `status-dot status-${s} mr-1`; document.getElementById('statusText').innerText = t; }
        function exec(c) { document.execCommand(c, false, null); }
        document.getElementById('editor').addEventListener('input', () => { isDirty = true; updateStatus('unsaved', 'Unsaved'); });
        setInterval(() => { if (isDirty) saveFile(); }, 10000);
    </script>
</body>
</html>
