<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudDrive Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #scroll-container { height: calc(100vh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #f8fafc; }
        #editor { min-height: 100%; padding: 2rem; outline: none; background: white; margin: 0; transition: transform 0.2s ease-in-out; transform-origin: top left; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; box-sizing: border-box; }
        #editor * { font-family: inherit !important; font-size: 1rem !important; color: #334155 !important; background-color: transparent !important; line-height: 1.5 !important; }
        #editor table, #editor td { all: revert; }
        #editor img { max-width: 100% !important; height: auto !important; display: block; margin: 1rem 0; }
        .toolbar-scroll { display: flex; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        #sidebar { transition: all 0.3s ease; width: 280px; z-index: 50; flex-shrink: 0; }
        .sidebar-closed { margin-left: -280px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-saved { background: #22c55e; }
        .status-unsaved { background: #ef4444; }
        .status-syncing { background: #3b82f6; animation: pulse 1s infinite; }
        .file-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; position: relative; min-width: 0; }
        .file-item:hover { background-color: #eff6ff; }
        .file-name { word-break: break-all; white-space: normal; font-size: 0.875rem; color: #334155; font-weight: 500; flex: 1; line-height: 1.25rem; }
        .delete-btn { opacity: 0; transition: opacity 0.2s, color 0.2s; color: #94a3b8; padding: 4px; border-radius: 4px; flex-shrink: 0; margin-top: -2px; }
        .file-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ef4444; background: #fee2e2; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden">
    <header class="bg-white border-b p-2 shadow-sm z-20">
        <div class="flex justify-between items-center px-2 gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-md"><i data-lucide="menu" size="20"></i></button>
                <h1 class="text-md font-bold text-blue-600 flex items-center gap-1">
                    <i data-lucide="cloud-cog" size="18"></i> <span>CloudDrive</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 flex-1 justify-end max-w-2xl">
                <input type="password" id="ghToken" placeholder="GitHub Token" class="w-full max-w-[120px] sm:max-w-[240px] border rounded-md px-3 py-1.5 text-xs focus:ring-2 focus:ring-blue-400 outline-none bg-slate-50 transition-all">
                <div id="saveStatus" class="flex text-[10px] uppercase font-bold text-slate-400 items-center shrink-0">
                    <span class="status-dot status-saved mr-1"></span> 
                    <span id="statusText">Ready</span>
                </div>
                <button onclick="syncFiles()" class="bg-blue-600 text-white p-1.5 rounded-md hover:bg-blue-700 transition-all">
                    <i data-lucide="refresh-cw" size="16"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="bg-white border-r flex flex-col h-full">
            <div class="p-4 flex justify-between items-center border-b bg-slate-50">
                <span class="text-xs font-bold uppercase text-slate-500">Files</span>
                <div class="flex gap-1">
                    <button onclick="document.getElementById('anyFileInput').click()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md"><i data-lucide="upload" size="18"></i></button>
                    <button onclick="createNewFile()" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md"><i data-lucide="file-plus" size="18"></i></button>
                </div>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-2 pb-20 space-y-1"></div>
        </aside>

        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full">
            <div class="p-1 border-b bg-slate-50/50 toolbar-scroll flex items-center gap-1">
                <button onclick="exec('bold')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="bold" size="16"></i></button>
                <button onclick="exec('italic')" class="p-2 min-w-[40px] hover:bg-white rounded"><i data-lucide="italic" size="16"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button onclick="insertTable()" class="p-2 min-w-[40px] text-slate-700 hover:bg-white rounded"><i data-lucide="table" size="18"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 min-w-[40px] text-blue-600 hover:bg-white rounded"><i data-lucide="image-plus" size="18"></i></button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImageSelect(event)">
                <input type="file" id="anyFileInput" class="hidden" onchange="uploadAnyFile(event)">
                <div class="ml-auto flex items-center bg-slate-200/50 rounded-lg px-1 shrink-0">
                    <button onclick="changeZoom(-0.1)" class="p-2 hover:bg-slate-200 rounded-md"><i data-lucide="zoom-out" size="16"></i></button>
                    <span id="zoomPercent" class="text-[10px] font-bold w-10 text-center">100%</span>
                    <button onclick="changeZoom(0.1)" class="p-2 hover:bg-slate-200 rounded-md"><i data-lucide="zoom-in" size="16"></i></button>
                </div>
                <span id="currentFileName" class="text-xs font-medium text-slate-400 truncate max-w-[100px] ml-2">No file</span>
            </div>

            <div id="scroll-container">
                <div id="editor" contenteditable="true" class="prose max-w-none text-base"></div>
            </div>
        </main>
    </div>

    <script>
        const REPO = 'patrickwoolf/my-online-drive';
        let currentFilePath = '', currentFileSha = '', isDirty = false, isSaving = false, zoomLevel = 1.0;

        const getHeaders = () => ({ 'Authorization': `token ${document.getElementById('ghToken').value}`, 'Accept': 'application/vnd.github.v3+json' });

        async function syncFiles() {
            if (!document.getElementById('ghToken').value) return;
            localStorage.setItem('gh_token', document.getElementById('ghToken').value);
            updateStatus('syncing', 'Syncing...');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/?t=${Date.now()}`, { headers: getHeaders() });
                const files = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';
                
                const editableExts = ['html', 'htm', 'txt', 'md', 'css', 'js', 'json', 'yaml', 'yml', 'php', 'py'];
                const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp'];

                files.forEach(f => {
                    if (f.type === 'dir' || f.name === 'assets') return;
                    
                    const hasExt = f.name.includes('.');
                    const ext = hasExt ? f.name.split('.').pop().toLowerCase() : '';
                    
                    const isEditable = !hasExt || editableExts.includes(ext);
                    const isPdf = ext === 'pdf';
                    const isImage = imageExts.includes(ext);
                    
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    
                    // 根據檔案類型選擇圖示
                    let icon = 'file';
                    let color = 'text-slate-400';
                    let label = 'File';

                    if (isEditable) { icon = 'file-edit'; color = 'text-blue-500'; label = !hasExt ? 'System File' : 'Editor'; }
                    else if (isPdf) { icon = 'file-text'; color = 'text-red-400'; label = 'PDF'; }
                    else if (isImage) { icon = 'image'; color = 'text-emerald-500'; label = 'Image'; }

                    div.onclick = (e) => {
                        if (e.target.closest('.delete-btn')) return;
                        handleFileClick(f.path, f.download_url, isEditable, isPdf, isImage, ext);
                    };

                    div.innerHTML = `
                        <div class="flex items-start gap-3 flex-1 min-w-0">
                            <i data-lucide="${icon}" size="18" class="${color} shrink-0 mt-0.5"></i>
                            <div class="flex flex-col">
                                <span class="file-name">${f.name}</span>
                                <span class="text-[9px] uppercase font-bold text-slate-400">${label}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); deleteFile('${f.path}', '${f.sha}')" class="delete-btn"><i data-lucide="trash-2" size="14"></i></button>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
                updateStatus('saved', 'Ready');
            } catch (err) { updateStatus('unsaved', 'Sync Error'); }
        }

        async function handleFileClick(path, url, isEditable, isPdf, isImage, ext) {
            if (isEditable) {
                updateStatus('syncing', 'Loading...');
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, { headers: getHeaders() });
                const data = await res.json();
                document.getElementById('editor').innerHTML = decodeURIComponent(escape(atob(data.content)));
                currentFilePath = path; currentFileSha = data.sha;
                document.getElementById('currentFileName').innerText = path;
                isDirty = false; updateStatus('saved', 'Opened');
            } else if (isPdf || isImage) {
                // PDF 或 圖片：抓取為 Blob URL 在新分頁開啟，確保瀏覽器能正確渲染預覽
                updateStatus('syncing', 'Opening...');
                try {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    // 根據副檔名決定 MIME Type
                    const mimeType = isPdf ? 'application/pdf' : `image/${ext === 'svg' ? 'svg+xml' : ext}`;
                    const blobUrl = URL.createObjectURL(new Blob([blob], {type: mimeType}));
                    window.open(blobUrl, '_blank');
                    updateStatus('saved', 'Opened in new tab');
                } catch (e) {
                    window.open(url, '_blank'); // fallback
                }
            } else { 
                window.open(url, '_blank'); 
            }
        }

        // --- 功能模組 ---
        function updateStatus(s, t) { document.querySelector('.status-dot').className = `status-dot status-${s} mr-1`; document.getElementById('statusText').innerText = t; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function exec(c) { document.execCommand(c, false, null); }
        function insertTable() { document.execCommand('insertHTML', false, '<table style="border:1px solid #ccc; width:100%"><tr><td></td><td></td></tr><tr><td></td><td></td></tr></table><p><br></p>'); }
        function changeZoom(delta) { zoomLevel = Math.min(Math.max(0.5, zoomLevel + delta), 2.0); applyZoom(); }
        function resetZoom() { zoomLevel = 1.0; applyZoom(); }
        function applyZoom() { document.getElementById('editor').style.transform = `scale(${zoomLevel})`; document.getElementById('zoomPercent').innerText = `${Math.round(zoomLevel * 100)}%`; }
        
        async function saveFile() { 
            if (!currentFilePath || isSaving) return; 
            isSaving = true; updateStatus('syncing', 'Saving...'); 
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor').innerHTML))); 
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentFilePath}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'save', content, sha: currentFileSha }) }); 
                if (res.ok) { const d = await res.json(); currentFileSha = d.content.sha; isDirty = false; updateStatus('saved', 'Saved'); } 
            } catch(e) {}
            isSaving = false; 
        }

        async function createNewFile() { const name = prompt("Filename:"); if (!name) return; currentFilePath = name; document.getElementById('editor').innerHTML = '<div>New Content</div>'; await saveFile(); syncFiles(); }
        async function uploadAnyFile(e) { const file = e.target.files[0]; if (!file) return; updateStatus('syncing', 'Uploading...'); const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = async () => { const base64 = reader.result.split(',')[1]; await fetch(`https://api.github.com/repos/${REPO}/contents/${file.name}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: `Upload: ${file.name}`, content: base64 }) }); syncFiles(); updateStatus('saved', 'Uploaded'); }; e.target.value = ''; }
        async function deleteFile(path, sha) { if (!confirm(`Delete ${path}?`)) return; const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ message: 'delete', sha: sha }) }); if (res.ok) syncFiles(); }
        
        // 圖片上傳 (工具列按鈕與貼上)
        async function processImageUpload(file) {
            if (!currentFilePath) { alert("Open a file first!"); return; }
            const tempId = 'img-' + Date.now();
            document.execCommand('insertHTML', false, `<img src="${URL.createObjectURL(file)}" id="${tempId}" style="opacity:0.5">`);
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/assets/${Date.now()}.jpg`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: 'img', content: base64 }) });
                if (res.ok) { const d = await res.json(); const img = document.getElementById(tempId); img.src = d.content.download_url; img.style.opacity = '1'; saveFile(); }
            };
        }
        function handleImageSelect(e) { if (e.target.files[0]) processImageUpload(e.target.files[0]); e.target.value = ''; }

        // 事件監聽
        document.getElementById('editor').addEventListener('input', () => { isDirty = true; updateStatus('unsaved', 'Unsaved'); });
        document.getElementById('editor').addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) { if (item.kind === 'file' && item.type.startsWith('image/')) { e.preventDefault(); processImageUpload(item.getAsFile()); } }
        });
        setInterval(() => { if (isDirty) saveFile(); }, 10000);
        document.addEventListener('DOMContentLoaded', () => { if (localStorage.getItem('gh_token')) { document.getElementById('ghToken').value = localStorage.getItem('gh_token'); syncFiles(); } });
    </script>
</body>
</html>
